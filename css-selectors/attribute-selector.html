<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute CSS Selector Example</title>
    <link rel="stylesheet" type="text/css" href="attribute-selector.css" />
</head>
<body>
    <h2>The attribute selectors</h2>

    <p title="xxx">Affects paragraph by presence of (title) attribute! <br/> Attribute value is unimportant, just name of an attribute (title here)</p>

    <p align="center">Paragraph will be affected by value of and attribute</p>

    <p align="left">Paragraph won't be affected since attribute value is not targeted by selector.</p>

    <input type="text" placeholder="Enter your text here">
</body>
</html>
