<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child CSS Selector Example</title>
    <link rel="stylesheet" type="text/css" href="child-selector.css" />
</head>
<body>
    <div class="wrapper">
        <h2>Direct Child Selector</h2>
        <p>This paragraph is a direct child of the <code>.wrapper</code> div.</p>
        <div>
            <p>This paragraph is inside a nested div and not a direct child of <code>.wrapper</code>.</p>
        </div>
    </div>
</body>
</html>
