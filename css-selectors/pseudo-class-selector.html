<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo class CSS Selector Example</title>
    <link rel="stylesheet" type="text/css" href="pseudo-class-selector.css" />
</head>
<body>
    <h2>Pseudo-Class Selectors Example</h2>
    <p>This is the first paragraph and styled with <code>:first-of-type</code>.</p>
    <p>This is another paragraph and is not affected by <code>:first-of-type</code>.</p>
    <a href="#">Hover over this link to see <code>:hover</code> in action.</a>
    <ul>
        <li>List item 1</li>
        <li>List item 2</li>
        <li>List item 3</li>
        <li>List item 4</li>
    </ul>
</body>
</html>
