<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grouping CSS Selector Example</title>
    <link rel="stylesheet" type="text/css" href="grouping-selector.css" />
</head>
<body>
    <h1>Grouped Selectors Example</h1>
    <p class="highlight">This paragraph is styled with the <code>.highlight</code> class.</p>
    <p id="special-paragraph">This paragraph is styled with the <code>#special-paragraph</code> ID.</p>
    <p>This paragraph contains a <a href="https://example.com" target="_blank">link </a> that opens in a new tab.</p>
</body>
</html>
