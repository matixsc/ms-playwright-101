<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descendant CSS Selector Example</title>
    <link rel="stylesheet" type="text/css" href="descendant-selector.css" />
</head>
<body>
    <div class="container">
        <p>This is a paragraph inside the div container.</p>
        <p>Another paragraph with a <span>highlighted</span> word.</p>
    </div>
    <p>This paragraph is outside container and it's not affected.</p>
</body>
</html>
