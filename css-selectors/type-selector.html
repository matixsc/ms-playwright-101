<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type CSS Selector Example</title>
    <!-- <link rel="stylesheet" type="text/css" href="type-selector.css" /> -->
</head>
<body>
    <h1>Type Selector Example</h1>
    <p>This paragraph is styled using a type selector for the <code>p</code> element.</p>
    <p>Type selectors allow you to apply styles to all elements of a particular type, like <code>h1</code> and <code>p</code>.</p>
    <ul>
        <li>This is a list item styled with a type selector.</li>
        <li>All <code>li</code> elements will follow the same style.</li>
    </ul>
</body>
</html>
