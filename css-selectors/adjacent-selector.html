<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adjacent Sibling CSS Selector Example</title>
    <link rel="stylesheet" type="text/css" href="adjacent-selector.css" />
</head>
<body>
    <h2>Section Title</h2>
    <p>This paragraph is styled using the adjacent sibling selector -<br/> because it directly follows an <code>h2</code> element.</p>
    <p>This paragraph is not affected by the adjacent sibling selector - <br/>because it is not directly after an <code>h2</code> element.</p>
</body>
</html>
