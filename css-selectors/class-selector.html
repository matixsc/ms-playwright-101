<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class CSS Selector Example</title>
    <link rel="stylesheet" type="text/css" href="class-selector.css" />
</head>
<body>
    <h2 class="highlight">This heading is styled using a class selector</h2>
    <p class="highlight">This paragraph also uses the <code>.highlight</code> class to share the same style.</p>
    <button class="button">Click Me</button>
</body>
</html>
